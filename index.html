<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>携华出行每日数据分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
  .header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 18px; font-weight: 600; color: #262626; }
  .date-selector { display: flex; align-items: center; gap: 8px; }
  .date-selector label { font-size: 14px; color: #666; }
  .date-selector select { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; color: #262626; background: #fff; cursor: pointer; }
  .iframe-container { width: 100%; height: calc(100vh - 60px); border: none; }
</style>
</head>
<body>
<div class="header">
  <div class="header-title">携华出行每日数据分析看板</div>
  <div class="date-selector">
    <label>选择日期：</label>
    <select id="dateSelect" onchange="loadReport()">
      <option value="report-20260707.html" selected>7月7日（2026-07-07）</option>
      <option value="report-20260706.html">7月6日（2026-07-06）</option>
      <option value="report-20260705.html">7月5日（2026-07-05）</option>
      <option value="report-20260704.html">7月4日（2026-07-04）</option>
      <option value="report-20260703.html">7月3日（2026-07-03）</option>
      <option value="report-20260702.html">7月2日（2026-07-02）</option>
      <option value="report-20260701.html">7月1日（2026-07-01）</option>
    </select>
  </div>
</div>
<iframe id="reportFrame" class="iframe-container" src="report-20260707.html"></iframe>
<script>
function loadReport() {
  var select = document.getElementById('dateSelect');
  var frame = document.getElementById('reportFrame');
  frame.src = select.value;
}
</script>
</body>
</html>
